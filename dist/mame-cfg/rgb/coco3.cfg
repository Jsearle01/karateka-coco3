<?xml version="1.0"?>
<!-- MAME coco3 config preset: Monitor Type = RGB. Place this folder's path after
     -cfg_directory, OR merge the <port .../> line below into your existing cfg/coco3.cfg
     (see dist/mame-cfg/README-monitor-cfg.md). value="1" = RGB; value="0" = Composite.
     NOTE: MAME REWRITES this file on exit (adds mixer/video/image blocks); that's harmless. -->
<mameconfig version="10">
    <system name="coco3">
        <input>
            <port tag=":screen_config" type="CONFIG" mask="1" defvalue="0" value="1" />
        </input>
    </system>
</mameconfig>
