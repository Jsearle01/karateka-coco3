<?xml version="1.0"?>
<!-- MAME coco3 config preset: Monitor Type = Composite (the MAME default). Place this folder's
     path after -cfg_directory, OR set the <port .../> line below to value="0" in your
     cfg/coco3.cfg (or just delete the line — Composite is the default).
     NOTE: MAME REWRITES this file on exit and OMITS the line below (value="0" == the default),
     leaving Composite in force by default; that's harmless. -->
<mameconfig version="10">
    <system name="coco3">
        <input>
            <port tag=":screen_config" type="CONFIG" mask="1" defvalue="0" value="0" />
        </input>
    </system>
</mameconfig>
